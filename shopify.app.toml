# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e020c880a2d21aa992903d7f09bda238"
name = "My test app"
application_url = "https://example.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[product.metafields.app.notes_enabled]
type = "boolean"
name = "Notes Enabled"
description = "Whether a customer notes field is shown on this product's page"

  [product.metafields.app.notes_enabled.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[product.metafields.app.notes_label]
type = "single_line_text_field"
name = "Notes Label"
description = "Custom label text for the customer notes field"

  [product.metafields.app.notes_label.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[product.metafields.app.notes_price]
type = "number_decimal"
name = "Notes Price"
description = "Additional price charged when a customer adds a note to this product"

  [product.metafields.app.notes_price.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
